<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF/DOCX Summarizer Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      white-space: pre-wrap;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>PDF / DOCX Summarizer Test</h2>

  <input type="file" id="fileInput" accept=".pdf,.docx" />
  <br />
  <button onclick="uploadFile()">Upload & Summarize</button>

  <h3>Response:</h3>
  <pre id="output">Waiting for upload...</pre>

  <script>
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const output = document.getElementById("output");

      if (!fileInput.files.length) {
        output.textContent = "Please select a PDF or DOCX file.";
        return;
      }

      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);

      output.textContent = "Uploading and summarizing... Please wait.";

      try {
        const response = await fetch("http://127.0.0.1:5000/api/summarize", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
